services:
  vpncontroller:
    build:
      context: .
      dockerfile: VpnController/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5080
      XRAY_DOCKER_CONTAINER_NAME: ${XRAY_DOCKER_CONTAINER_NAME:-xray}
      XRAY_CONFIG_DIRECTORY: ${XRAY_CONFIG_DIRECTORY:-/xray/config}
    volumes:
      - vpncontroller_data:/app/data
      - ./config/xray:/xray/config
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - xray

  xray:
    image: teddysun/xray:latest
    restart: unless-stopped
    container_name: xray
    volumes:
      - ./config/xray:/etc/xray
    ports:
      - "8443:8443/tcp"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      UPSTREAM: ${UPSTREAM:-vpncontroller:5080}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - vpncontroller

volumes:
  vpncontroller_data:
  caddy_data:
  caddy_config:
